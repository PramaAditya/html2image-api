<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/textfit/2.4.0/textFit.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 100vw;
        height: 100vh;
        font-family: "Inter", sans-serif;
        background-color: #7f1d1d; /* Deep red background */
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .image-container {
        width: 100vw;
        height: 52vh;
        background-image: url("{{{image_url}}}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #4a0f0f;
      }
      .content-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 6vw 4vw 6vw;
        position: relative;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: -3.5vh; /* pulls it up overlapping the image */
        margin-bottom: 2vh;
        z-index: 10;
      }
      .breaking-badge {
        background-color: #000000;
        color: white;
        padding: 1vh 2vw;
        font-weight: 900;
        font-size: 2.2vh;
        display: flex;
        align-items: center;
        gap: 1vw;
      }
      .date-text {
        font-weight: 700;
        font-size: 2vh;
        color: #fff;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 1vh 2vw;
      }
      .title-wrapper {
        flex: 1; /* Take up all remaining space between divider and footer */
        width: 100%;
        margin-bottom: 2vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* Align text to the top */
      }
      .title-block {
        width: 100%;
        height: 100%;
      }
      .title {
        font-family: "Playfair Display", serif;
        font-weight: 900;
        line-height: 1.15;
        color: #ffffff;
        margin-bottom: 0.2em; /* use em so it scales with textFit */
      }
      .title strong {
        font-weight: 900;
        background-color: #000000; /* Black highlight for bold */
        color: white;
        padding: 0 0.15em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
      }
      .title em {
        font-style: italic;
      }
      .subtitle {
        font-size: 0.5em; /* 50% size of the title */
        color: #e5e5e5;
        line-height: 1.4;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding-bottom: 1vh;
      }
      .source {
        font-weight: 700;
        font-size: 2vh;
        color: #ffffff;
        padding-bottom: 1vh;
        border-bottom: 0.2vh solid #ffffff;
        flex: 1;
        margin-right: 2vw;
      }
      .handle-box {
        background-color: #000000;
        color: white;
        padding: 1.2vh 2.5vw;
        display: flex;
        align-items: center;
        gap: 1vw;
        border-radius: 0vw;
      }
      .handle-text {
        font-weight: 700;
        font-size: 2.2vh;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="image-container"></div>
    <div class="content-container">
      <div class="top-bar">
        <div class="breaking-badge">BREAKING</div>
        <div class="date-text">{{date}}</div>
      </div>

      <div class="title-wrapper" id="fit-container">
        <div class="title-block">
          <div class="title">
            {{{title}}}
          </div>
          {{#if subtitle}}
          <div class="subtitle">
            {{{subtitle}}}
          </div>
          {{/if}}
        </div>
      </div>

      <div class="footer">
        <div class="source">{{#if source}}Sumber: {{source}}{{/if}}</div>
        <div class="handle-box">
          <div class="handle-text">{{my_handle}}</div>
        </div>
      </div>
    </div>

    <script>
      window.onload = function () {
        textFit(document.getElementById("fit-container"), {
          multiLine: true,
          alignHoriz: false,
          alignVert: false,
          minFontSize: 16,
          maxFontSize: 80,
        });
      };
    </script>
  </body>
</html>
